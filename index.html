<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <meta name="theme-color" content="#75bdf2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="탐정 퀘스트 클럽" />
    <meta name="application-name" content="탐정 퀘스트 클럽" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>탐정 퀘스트 클럽</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="topbar" aria-label="게임 정보">
        <div>
          <p class="eyebrow">사건 선택형 추리 게임</p>
          <h1>탐정 퀘스트 클럽</h1>
        </div>
        <div class="case-card" id="caseCard">
          <img src="assets/icon-512.png" alt="탐정 퀘스트 클럽" id="caseImage" />
          <div>
            <span>사건 파일</span>
            <strong id="caseName">해결할 사건을 선택하세요</strong>
          </div>
        </div>
        <button class="icon-button" id="newGameButton" type="button" aria-label="새 게임">↻</button>
        <button class="install-button" id="installButton" type="button" hidden>앱 설치</button>
      </section>

      <section class="case-select" id="caseSelect" aria-label="사건 선택"></section>

      <section class="quest-board">
        <aside class="quest-panel" aria-label="현재 추리">
          <p class="eyebrow" id="caseProgress">첫 번째 사건</p>
          <h2 id="sceneTitle"></h2>
          <p id="sceneText"></p>
          <div class="scene-actions" id="sceneActions"></div>
        </aside>

        <section class="map-panel" aria-label="탐정 지도">
          <img class="map-art" src="assets/quest-map.jpg" alt="마을 탐정 지도" id="mapImage" />
          <div class="map-pins" id="mapPins"></div>
        </section>
      </section>

      <section class="play-area">
        <section class="suspects" aria-label="용의자 목록" id="suspects"></section>
        <section class="deduction-panel" aria-label="추리 상황">
          <div class="deduction-heading">
            <h2>추리 레이더</h2>
            <span id="deductionCount">조사 시작</span>
          </div>
          <div class="deduction-screen" id="deductionScreen"></div>
        </section>
      </section>
    </main>

    <section class="place-view" id="placeView" aria-label="세부 장소" hidden>
      <div class="place-dialog">
        <div class="place-hero" id="placeScene">
          <img src="assets/quest-map.jpg" alt="" id="placeSceneImage" />
          <button class="clue-hotspot" id="clueHotspot" type="button" aria-label="현장 단서 조사하기">
            <span></span>
          </button>
          <button class="suspect-actor" id="suspectActor" type="button" aria-label="용의자와 대화하기">
            <img id="placeSuspectImage" src="assets/baker.jpg" alt="" />
          </button>
          <button class="clue-discovery" id="clueDiscovery" type="button" hidden></button>
          <button class="place-bubble" id="placeBubble" type="button" hidden></button>
          <button class="close-button" id="closePlaceButton" type="button" aria-label="지도 화면으로 돌아가기">×</button>
        </div>
        <div class="place-content">
          <p class="eyebrow" id="placeStep">세부 장소</p>
          <h2 id="placeName"></h2>
          <p id="placeIntro"></p>
          <div class="scene-tip" id="sceneTip"></div>
        </div>
      </div>
    </section>

    <section class="quiz-popup" id="quizPopup" aria-label="힌트 아이템 퀴즈" hidden>
      <div class="quiz-card">
        <p class="eyebrow">힌트 아이템 퀴즈</p>
        <h2 id="quizTitle"></h2>
        <p id="quizQuestion"></p>
        <div class="quiz-options" id="quizOptions"></div>
        <button class="action-button" id="quizCloseButton" type="button">조금 더 둘러보기</button>
      </div>
    </section>

    <section class="evidence-popup" id="evidencePopup" aria-label="게임 알림" hidden>
      <div class="evidence-card">
        <div class="evidence-icon" id="evidenceIcon">!</div>
        <div>
          <p class="eyebrow" id="evidenceType">게임 알림</p>
          <h2 id="evidenceTitle"></h2>
          <p id="evidenceText"></p>
        </div>
        <button class="action-button primary" id="evidenceCloseButton" type="button">좋아!</button>
      </div>
    </section>

    <section class="ending-view" id="endingView" aria-label="최종 엔딩" hidden>
      <div class="ending-sky" aria-hidden="true"></div>
      <div class="ending-card">
        <img src="assets/icon-512.png" alt="" />
        <p class="eyebrow">모든 사건 해결</p>
        <h2>탐정 퀘스트 클럽 완전 클리어!</h2>
        <p>네 사건과 마지막 거짓말까지 모두 밝혀냈어요.</p>
        <button class="action-button primary" id="endingCloseButton" type="button">사건 선택으로 돌아가기</button>
      </div>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="script.js"></script>
  </body>
</html>
